<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>크롤링 결과 확인 - AI PC 견적 평가 시스템</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo">AI PC 견적 평가</div>
      <nav>
        <button onclick="navigateTo('main')">메인</button>
        <button onclick="navigateTo('input')">견적 입력</button>
        <button onclick="navigateTo('result')">분석 결과</button>
        <button onclick="navigateTo('detail')">상세 분석</button>
        <button onclick="navigateTo('recommend')">교체 추천</button>
        <button onclick="navigateTo('crawl')">크롤링 보기</button>
      </nav>
    </header>

    <main>
      <section class="page active">
        <div class="section-title">
          <h2>입력 견적 기반 크롤링 결과</h2>
          <p>
            입력한 PC 부품 이름을 바탕으로 DC인사이드에서 연관 게시글을 검색하여
            관련 정보를 제공합니다.
          </p>
        </div>

        <div class="card">
          <div class="crawl-summary-grid">
            <div class="summary-card">
              <span>총 게시글</span>
              <strong id="crawlCount">-</strong>
            </div>
            <div class="summary-card">
              <span>최신 수집일</span>
              <strong id="crawlLatestDate">-</strong>
            </div>
            <div class="summary-card">
              <span>수집 출처</span>
              <strong id="crawlSources">-</strong>
            </div>
          </div>

          <div class="crawl-query">
            <span>검색 키워드</span>
            <strong id="crawlQuery">입력 견적을 먼저 등록해 주세요.</strong>
          </div>

          <div class="section-subtitle">
            <h3>감정 평가 요약</h3>
          </div>
          <div id="sentimentSummary" class="sentiment-summary">
            <div class="sentiment-stats">
              <div class="stat-item">
                <span>긍정</span>
                <strong class="positive">-</strong>
              </div>
              <div class="stat-item">
                <span>중립</span>
                <strong class="neutral">-</strong>
              </div>
              <div class="stat-item">
                <span>부정</span>
                <strong class="negative">-</strong>
              </div>
              <div class="stat-item">
                <span>평균 점수</span>
                <strong>-%</strong>
              </div>
            </div>
          </div>

          <div class="section-subtitle">
            <h3>크롤링 게시글</h3>
            <p>
              입력 견적과 관련된 DC인사이드 게시글을 검색 결과로 확인할 수
              있습니다.
            </p>
          </div>

          <div class="table-wrap">
            <table class="price-table crawl-table">
              <thead>
                <tr>
                  <th>출처</th>
                  <th>제목</th>
                  <th>검색 키워드</th>
                  <th>게시일</th>
                  <th>수집 시각</th>
                  <th>링크</th>
                  <th>감정평가</th>
                </tr>
              </thead>
              <tbody id="crawlTableBody">
                <tr>
                  <td colspan="7">크롤링 예시 데이터를 불러오는 중입니다.</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="button-row">
            <button class="btn btn-secondary" onclick="navigateTo('main')">
              메인으로
            </button>
            <button class="btn btn-primary" onclick="navigateTo('input')">
              견적 입력하기
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
